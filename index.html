<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Link Index</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-muted: #f7f7f5;
        --ink: #37352f;
        --muted: #787774;
        --faint: #9b9a97;
        --line: #e9e9e7;
        --line-strong: #d3d3d1;
        --accent: #2f3437;
        --accent-soft: #eeeeec;
        --focus: #8a8a86;
        --danger: #a9352b;
        --radius: 6px;
        --shadow: 0 12px 32px rgba(15, 15, 15, 0.08);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Helvetica,
          "Apple Color Emoji",
          Arial,
          "Noto Sans JP",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-size: 15px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      input::placeholder,
      textarea::placeholder {
        color: #b8b7b3;
        opacity: 1;
      }

      button {
        color: inherit;
      }

      a {
        color: inherit;
      }

      .app {
        width: min(1120px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 34px 0 48px;
        display: flex;
        flex-direction: column;
      }

      .masthead {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        padding-bottom: 8px;
      }

      .eyebrow {
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.18;
        letter-spacing: 0;
        font-weight: 700;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .settings-wrap {
        position: relative;
      }

      .settings-menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        z-index: 15;
        display: none;
        min-width: 168px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 4px;
      }

      .settings-menu.open {
        display: grid;
        gap: 2px;
      }

      .settings-menu .button {
        width: 100%;
        justify-content: flex-start;
        border: 0;
        background: transparent;
      }

      .settings-menu .button:hover {
        background: var(--surface-muted);
      }

      .button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        cursor: pointer;
        transition:
          background 120ms ease,
          color 120ms ease,
          border-color 120ms ease;
        white-space: nowrap;
        font-size: 14px;
        font-weight: 500;
      }

      .button:hover {
        border-color: var(--line-strong);
        background: var(--surface-muted);
      }

      .button:active {
        background: #ededeb;
      }

      .button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
        font-weight: 600;
      }

      .button.icon {
        width: 36px;
        padding: 0;
      }

      .button.icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .button.danger {
        color: var(--danger);
      }

      .button.subtle {
        color: var(--muted);
      }

      .button.pin-action {
        min-width: 72px;
        border-color: var(--line-strong);
      }

      .button.pin-action.active {
        background: var(--accent-soft);
        border-color: var(--line-strong);
        color: var(--ink);
        font-weight: 700;
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto minmax(280px, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin: 18px 0 12px;
      }

      .segments {
        display: inline-flex;
        align-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .segment {
        position: relative;
        min-width: 104px;
        height: 42px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition:
          background 120ms ease,
          color 120ms ease;
      }

      .segment + .segment {
        border-left: 1px solid var(--line);
      }

      .segment[aria-pressed="true"] {
        color: var(--ink);
        background: #fbfbfa;
      }

      .segment[aria-pressed="true"]::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: var(--accent);
      }

      .segment:hover {
        background: var(--surface-muted);
        color: var(--ink);
      }

      .segment svg {
        width: 16px;
        height: 16px;
        color: currentColor;
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap svg {
        position: absolute;
        left: 13px;
        top: 50%;
        width: 16px;
        height: 16px;
        transform: translateY(-50%);
        color: var(--faint);
        pointer-events: none;
      }

      .search {
        width: 100%;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 0 14px 0 38px;
        color: var(--ink);
        outline: none;
        font-size: 14px;
      }

      .search:focus,
      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--focus);
        box-shadow: 0 0 0 2px rgba(35, 131, 226, 0.14);
      }

      .toolbar-meta {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 0;
      }

      .filter-toggle[aria-pressed="true"],
      .filter-toggle.active {
        background: var(--accent-soft);
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .stats {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .tagbar {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 22px;
      }

      .tagbar.open {
        display: flex;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        min-height: 30px;
        padding: 0 11px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 400;
      }

      .chip[aria-pressed="true"] {
        background: var(--accent-soft);
        border-color: var(--accent-soft);
        color: var(--ink);
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .board {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        align-items: start;
      }

      .favorites-section {
        display: grid;
        grid-template-columns: 210px minmax(0, 1fr);
        gap: 0;
        align-items: start;
        margin-bottom: 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
      }

      .favorites-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 28px;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
        min-height: 28px;
        height: 100%;
        border-right: 1px solid var(--line);
        background: var(--surface-muted);
        padding: 8px 10px;
      }

      .favorites-title-wrap {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .favorites-icon {
        width: 16px;
        height: 16px;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .favorites-icon svg {
        width: 12px;
        height: 12px;
        display: block;
      }

      .favorites-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--ink);
      }

      .favorites-section .link-grid {
        border-color: var(--line-strong);
      }

      .group-section {
        display: grid;
        grid-template-columns: 210px minmax(0, 1fr);
        gap: 0;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        min-width: 0;
      }

      .group-section.collapsed {
        background: var(--surface-muted);
      }

      .group-section.collapsed .group-head {
        min-height: 20px;
        padding-top: 2px;
        padding-bottom: 2px;
      }

      .group-section.collapsed .group-title-wrap {
        padding-top: 0;
        padding-bottom: 0;
      }

      .group-section.collapsed .group-title {
        font-size: 12px;
        line-height: 1.15;
      }

      .group-section.collapsed .count {
        font-size: 11px;
        line-height: 1;
      }

      .group-section.collapsed .group-toggle {
        width: 14px;
        height: 14px;
      }

      .group-section.collapsed .group-toggle svg {
        width: 11px;
        height: 11px;
      }

      .group-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 28px;
        align-items: center;
        justify-content: flex-start;
        gap: 7px;
        min-height: 28px;
        height: 100%;
        margin-bottom: 0;
        border-right: 1px solid var(--line);
        background: var(--surface-muted);
        padding: 8px 10px;
      }

      .group-section.collapsed .group-head {
        margin-bottom: 0;
      }

      .group-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .group-title-area {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
        max-width: 100%;
      }

      .group-title-wrap {
        appearance: none;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--ink);
        padding: 3px 4px 3px 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-width: 100%;
        cursor: pointer;
      }

      .group-title-wrap:hover {
        background: #ededeb;
      }

      .group-add {
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 0;
        line-height: 0;
        padding: 0;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 120ms ease,
          background 120ms ease,
          color 120ms ease;
      }

      .group-add::before {
        content: "+";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        line-height: 1;
        font-weight: 500;
        transform: translateY(-2px);
      }

      .group-section:hover .group-add,
      .group-add:focus-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .group-add:hover {
        background: var(--surface-muted);
        color: var(--ink);
      }

      .group-toggle {
        width: 16px;
        height: 16px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 120ms ease;
      }

      .group-section.collapsed .group-toggle {
        transform: rotate(-90deg);
      }

      .group-toggle svg {
        width: 13px;
        height: 13px;
        display: block;
      }

      /* 全リンク（All）はグループ群と区切って下部に置き、横幅いっぱいに使う */
      .group-section--all {
        border-color: var(--line-strong);
        margin-top: 6px;
      }

      .group-section--all .group-head {
        background: var(--surface);
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
        align-self: center;
        justify-self: end;
        text-align: right;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono",
          Menlo, monospace;
      }

      mark {
        border-radius: 3px;
        background: #fff2a8;
        color: inherit;
        padding: 0 1px;
      }

      .link-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 7px;
        align-items: flex-start;
        padding: 8px 10px;
      }

      .link-grid[hidden] {
        display: none;
      }

      .link-button {
        width: auto;
        max-width: 100%;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--surface);
        padding: 4px 7px;
        text-align: left;
        cursor: pointer;
        overflow: hidden;
        display: grid;
        grid-template-columns: 14px minmax(0, 1fr);
        gap: 6px;
        align-items: center;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          color 120ms ease;
        font-size: 13px;
        font-weight: 500;
      }

      .link-button:last-child {
        border-bottom: 1px solid var(--line);
      }

      .link-button:hover {
        background: var(--surface-muted);
        border-color: var(--line-strong);
      }

      .board-link-icon {
        width: 14px;
        height: 14px;
        border: 1px solid var(--line);
        border-radius: 4px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          background 120ms ease;
      }

      .board-link-icon svg {
        width: 9px;
        height: 9px;
        display: block;
      }

      .link-button:hover .board-link-icon {
        background: var(--surface);
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .board-link-content {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
      }

      .board-link-title {
        display: block;
        flex: 1 1 auto;
        min-width: 0;
        overflow: visible;
        text-overflow: clip;
        white-space: nowrap;
        line-height: 1.3;
      }

      .board-link-pin {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .board-link-pin svg {
        width: 9px;
        height: 9px;
        display: block;
      }

      .list {
        --list-columns: 42px minmax(0, 1.2fr) minmax(0, 1.25fr) 120px
          minmax(0, 160px) 214px;
      }

      .list-head {
        display: grid;
        grid-template-columns: var(--list-columns);
        gap: 14px;
        align-items: center;
        min-width: 0;
        padding: 4px 0 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .list-head > div:last-child {
        justify-self: end;
      }

      .row {
        display: grid;
        grid-template-columns: var(--list-columns);
        gap: 14px;
        align-items: center;
        padding: 13px 0;
        border-top: 1px solid var(--line);
        min-width: 0;
      }

      .row-index {
        color: var(--muted);
        font-size: 12px;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono",
          Menlo, monospace;
        line-height: 1.4;
      }

      .row-title {
        min-width: 0;
        line-height: 1.4;
      }

      .row-title-button {
        display: block;
        width: 100%;
        min-width: 0;
        border: 0;
        background: transparent;
        padding: 0;
        color: var(--accent);
        text-align: left;
        cursor: pointer;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-decoration: underline;
        text-decoration-color: transparent;
        text-underline-offset: 3px;
        transition:
          color 120ms ease,
          text-decoration-color 120ms ease;
      }

      .row-title-button:hover {
        color: var(--ink);
        text-decoration-color: currentColor;
      }

      .row-url {
        appearance: none;
        min-width: 0;
        border: 0;
        background: transparent;
        padding: 0;
        color: var(--muted);
        font-size: 12px;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono",
          Menlo, monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: left;
        cursor: copy;
      }

      .row-url-cell {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .row-url:hover {
        color: var(--ink);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .copy-feedback {
        min-height: 14px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .copy-feedback.show {
        opacity: 1;
      }

      .row-group {
        min-width: 0;
        color: var(--muted);
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-tags {
        min-width: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-content: center;
        align-items: center;
        overflow: hidden;
      }

      .mini-tag {
        min-width: 0;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        padding: 2px 7px;
        font-size: 11px;
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-actions {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .row-action {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 2px 0;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        line-height: 1.3;
        transition: color 120ms ease;
      }

      .row-action:hover {
        color: var(--ink);
      }

      .row-action.danger:hover {
        color: var(--danger);
      }

      .row-action.active {
        color: var(--ink);
        font-weight: 700;
      }

      .row-action-icon {
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .row-action-icon svg {
        width: 14px;
        height: 14px;
        display: block;
      }

      .summary {
        display: grid;
        gap: 8px;
        padding: 18px 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      .summary strong {
        color: var(--ink);
        font-weight: 600;
      }

      .empty {
        padding: 56px 16px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        text-align: center;
      }

      .empty-title {
        color: var(--muted);
      }

      .empty-detail {
        margin-top: 8px;
        color: var(--faint);
        font-size: 13px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(15, 15, 15, 0.22);
        z-index: 20;
      }

      .modal.open {
        display: flex;
      }

      .dialog {
        width: min(680px, 100%);
        max-height: calc(100vh - 36px);
        overflow: auto;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      #modal .dialog {
        overflow: visible;
      }

      .dialog-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .dialog-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
      }

      .form {
        display: grid;
        gap: 16px;
        padding: 18px 20px 20px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        color: var(--ink);
        outline: none;
        padding: 10px 11px;
      }

      .field textarea {
        min-height: 58px;
        resize: vertical;
        line-height: 1.6;
      }

      .link-meta-grid {
        display: grid;
        grid-template-columns: minmax(160px, 0.85fr) minmax(220px, 1.15fr);
        gap: 12px;

      }

        position: relative;
      }

      .group-menu {
        position: absolute;
        z-index: 25;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        max-height: 190px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        box-shadow: var(--shadow);
        padding: 4px;

        gap: 2px;
      }

      .group-option {
        min-height: 32px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--ink);
        padding: 0 9px;
        text-align: left;
        cursor: pointer;
        font-size: 14px;
      }

      .group-option:hover,
      .group-option.active {
        background: var(--surface-muted);
      }

      .tag-token {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        max-width: 100%;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-muted);
        padding: 0 8px;
        color: var(--ink);
        font-size: 13px;
      }

      #selectedTags {
        display: contents;
      }

      .tag-remove {
        border: 0;
        background: transparent;
        padding: 0;
        color: var(--muted);
        cursor: pointer;
        line-height: 1;
      }

      .tag-input {
        flex: 1 1 130px;
        min-width: 110px;
        height: 30px;
        border: 0;
        outline: none;
        padding: 0 5px;
        color: var(--ink);
        background: transparent;
      }

      .tag-menu {
        position: absolute;
        z-index: 25;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        display: none;
        max-height: 190px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #ffffff;
        box-shadow: var(--shadow);
        padding: 4px;
      }

      .tag-menu.open {
        display: grid;
        gap: 2px;
      }

      .tag-option {
        min-height: 32px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--ink);
        padding: 0 9px;
        text-align: left;
        cursor: pointer;
        font-size: 14px;
      }

      .tag-option:hover,
      .tag-option.active {
        background: var(--surface-muted);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .group-manager {
        display: grid;
        gap: 14px;
        padding: 18px 20px 20px;
      }

      .inline-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: end;
      }

      .inline-form .button {
        height: 40px;
        min-width: 72px;
      }

      .group-list {
        display: grid;
        gap: 0;
        border-top: 1px solid var(--line);
      }

      .group-next-action {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-muted);
        padding: 10px 11px;
        color: var(--muted);
        font-size: 13px;
      }

        display: flex;
      }

      .group-next-action strong {
        color: var(--ink);
        font-weight: 600;
      }

      .group-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
        min-height: 44px;

      .group-name {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 5px;
        background: transparent;
        color: var(--ink);

        align-items: center;
        gap: 6px;
        font-weight: 500;
        text-align: left;
        cursor: text;

        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .group-edit-icon {
        display: inline-flex;
        flex-shrink: 0;
        color: var(--muted);
        opacity: 0.5;
        transition:
          opacity 120ms ease,
          color 120ms ease;
      }

      .group-edit-icon svg {
        width: 13px;
        height: 13px;
        display: block;
      }

      .group-name:hover {
        background: var(--surface-muted);
        border-color: var(--line-strong);
      }

      .group-name:hover .group-edit-icon {
        opacity: 1;
        color: var(--ink);
      }

      .group-edit-input {
        width: 100%;
        min-width: 0;
        height: 34px;
        border: 1px solid var(--focus);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--ink);
        padding: 0 9px;
        outline: none;
      }

      .group-meta {
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
        white-space: nowrap;
        text-align: right;
      }

      .group-actions {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding-top: 4px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%) translateY(20px);
        opacity: 0;
        pointer-events: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        padding: 10px 14px;
        font-size: 13px;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        z-index: 30;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .hidden-input {
        display: none;
      }

      .footer {
        margin-top: auto;
        padding-top: 44px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .masthead,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        .toolbar-meta {
          justify-content: flex-start;
        }

        .board {

        .favorites-section,

        .row {

        }

          display: none;
        }

        }
      }

        }

        .link-button {
          grid-template-columns: 14px minmax(0, 1fr);
        }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            state.links = sampleLinks;
            state.groups = getUniqueGroups([
              ...DEFAULT_GROUPS,
              ...sampleLinks.map((link) => link.group),
            ]);
            persist();
            return;
          }
          const parsed = JSON.parse(raw);
          state.links = Array.isArray(parsed.links)
            ? parsed.links.map(normalizeLink)
            : [];
          state.groups = getUniqueGroups([
            ...DEFAULT_GROUPS,
            ...(Array.isArray(parsed.groups) ? parsed.groups : []),
            ...state.links.map((link) => link.group),
          ]);
          state.collapsedGroups = Array.isArray(parsed.collapsedGroups)
            ? parsed.collapsedGroups.map(cleanGroup)
            : [];
        } catch {
          state.links = sampleLinks;
          state.groups = getUniqueGroups([
            ...DEFAULT_GROUPS,
            ...sampleLinks.map((link) => link.group),
          ]);
          persist();
        }
      }

      function persist() {
        try {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              version: 1,
              groups: state.groups,
              collapsedGroups: state.collapsedGroups,
              links: state.links,
            }),
          );
        } catch (error) {
          const quotaExceeded =
            error && (error.name === "QuotaExceededError" || error.code === 22);
          showToast(
            quotaExceeded
              ? "保存容量の上限に達しました。Exportでバックアップしてください"
              : "データの保存に失敗しました",
          );
        }
      }

      function normalizeLink(link) {
        return {
          id: link.id || uid(),
          title: String(link.title || "").trim(),
          url: normalizeUrl(String(link.url || "").trim()),
          group: cleanGroup(link.group),
          tags: normalizeTags(
            Array.isArray(link.tags) ? link.tags.join(",") : link.tags || "",
          ),
          note: String(link.note || "").trim(),
          createdAt: Number(link.createdAt) || Date.now(),
          updatedAt: link.updatedAt ? Number(link.updatedAt) : undefined,
          pinned: Boolean(link.pinned),
          lastOpenedAt: link.lastOpenedAt
            ? Number(link.lastOpenedAt)
            : undefined,
        };
      }

      function normalizeUrl(value) {
        const trimmed = value.trim();
        if (!trimmed) return "";
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        return `https://${trimmed}`;
      }

      function cleanGroup(value) {
        const group = String(value || "").trim();
        if (!group || group === "未分類") return NO_GROUP;
        return group;
      }

      function getUniqueGroups(groups) {
        return groups
          .map(cleanGroup)
          .filter((group, index, list) => list.indexOf(group) === index);
      }

      function normalizeTags(value) {
        return String(value || "")
          .split(",")
          .map((tag) => tag.trim().toLowerCase())
          .filter(Boolean)
          .filter((tag, index, list) => list.indexOf(tag) === index);
      }

      function getQueryTerms() {
        return state.query.trim().toLowerCase().split(/\s+/).filter(Boolean);
      }

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function getFilteredLinks() {
        const terms = getQueryTerms();
        return state.links
          .filter((link) => {
            const tagMatched =
              state.tag === "all" || link.tags.includes(state.tag);
            if (!tagMatched) return false;
            if (!terms.length) return true;
            const haystack = [
              link.title,
              link.url,
              link.group,
              link.tags.join(" "),
              link.note,
            ]
              .join(" ")
              .toLowerCase();
            return terms.every((term) => haystack.includes(term));
          })
          .sort(
            (a, b) =>
              a.group.localeCompare(b.group, "ja") ||
              a.title.localeCompare(b.title, "ja"),
          );
      }

      function appendHighlighted(parent, text) {
        const terms = getQueryTerms();
        if (!terms.length) {
          parent.textContent = text;
          return;
        }

        const pattern = terms
          .slice()
          .sort((a, b) => b.length - a.length)
          .map(escapeRegExp)
          .join("|");
        const regex = new RegExp(`(${pattern})`, "gi");
        const fragment = document.createDocumentFragment();
        let lastIndex = 0;
        let match;
        while ((match = regex.exec(text)) !== null) {
          if (match.index > lastIndex) {
            fragment.append(
              document.createTextNode(text.slice(lastIndex, match.index)),
            );
          }
          fragment.append(
            Object.assign(document.createElement("mark"), {
              textContent: match[0],
            }),
          );
          lastIndex = match.index + match[0].length;
          if (match.index === regex.lastIndex) regex.lastIndex++;
        }
        if (lastIndex < text.length) {
          fragment.append(document.createTextNode(text.slice(lastIndex)));
        }
        parent.append(fragment);
      }

      function reconcileActiveTag() {
        if (
          state.tag !== "all" &&
          !state.links.some((link) => link.tags.includes(state.tag))
        ) {
          state.tag = "all";
        }
      }

      function render() {
        reconcileActiveTag();
        const filtered = getFilteredLinks();
        renderStats(filtered);
        renderTags();
        renderGroups();
        if (els.groupsModal.classList.contains("open")) renderGroupList();
        if (state.view === "board") {
          renderBoard(filtered);
        } else {
          renderList(filtered);
        }
        updateView();
      }

      function renderStats(filtered) {
        const total = state.links.length;
        const shown = filtered.length;
        const groups = new Set(
          state.links.map((link) => cleanGroup(link.group)),
        ).size;
        els.stats.textContent = `${shown}/${total} links · ${groups} groups`;
      }

      function renderTags() {
        const counts = new Map();
        state.links.forEach((link) =>
          link.tags.forEach((tag) =>
            counts.set(tag, (counts.get(tag) || 0) + 1),
          ),
        );
        const tags = [...counts.entries()].sort((a, b) =>
          a[0].localeCompare(b[0]),
        );
        els.tagbar.replaceChildren();
        els.tagbar.append(createTagButton("all", state.links.length));
        tags.forEach(([tag, count]) =>
          els.tagbar.append(createTagButton(tag, count)),
        );
        els.tagbar.classList.toggle("open", state.tagbarOpen);
        els.tagToggleButton.setAttribute(
          "aria-expanded",
          String(state.tagbarOpen),
        );
        els.tagToggleButton.setAttribute(
          "aria-pressed",
          String(state.tagbarOpen),
        );
        els.tagToggleButton.setAttribute(
          "aria-label",
          state.tagbarOpen ? "タグフィルターを非表示" : "タグフィルターを表示",
        );
        els.tagToggleButton.classList.toggle("active", state.tag !== "all");
      }

      function createTagButton(tag, count) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chip";
        button.textContent = tag === "all" ? `all ${count}` : `${tag} ${count}`;
        button.setAttribute("aria-pressed", String(state.tag === tag));
        button.addEventListener("click", () => {
          state.tag = state.tag === tag && tag !== "all" ? "all" : tag;
          render();
        });
        return button;
      }

      function getAllTags() {
        return [...new Set(state.links.flatMap((link) => link.tags))].sort(
          (a, b) => a.localeCompare(b),
        );
      }

      function renderTagSelect() {
        els.selectedTags.replaceChildren(
          ...state.formTags.map((tag) => {
            const token = document.createElement("span");
            token.className = "tag-token";
            token.textContent = tag;

            const remove = document.createElement("button");
            remove.type = "button";
            remove.className = "tag-remove";
            remove.textContent = "x";
            remove.setAttribute("aria-label", `${tag} を削除`);
            remove.addEventListener("click", () => removeFormTag(tag));

            token.append(remove);
            return token;
          }),
        );

        const query = els.tagsInput.value.trim().toLowerCase();
        const candidates = getAllTags()
          .filter((tag) => !state.formTags.includes(tag))
          .filter((tag) => !query || tag.includes(query));

        els.tagMenu.replaceChildren();
        candidates.forEach((tag) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "tag-option";
          option.textContent = tag;
          option.dataset.value = tag;
          option.addEventListener("mousedown", (event) =>
            event.preventDefault(),
          );
          option.addEventListener("click", () => addFormTag(tag));
          els.tagMenu.append(option);
        });

        if (
          query &&
          !state.formTags.includes(query) &&
          !candidates.includes(query)
        ) {
          const create = document.createElement("button");
          create.type = "button";
          create.className = "tag-option";
          create.textContent = `Create "${query}"`;
          create.dataset.value = query;
          create.addEventListener("mousedown", (event) =>
            event.preventDefault(),
          );
          create.addEventListener("click", () => addFormTag(query));
          els.tagMenu.prepend(create);
        }

        const options = getTagOptions();
        if (state.tagActiveIndex >= options.length)
          state.tagActiveIndex = Math.max(options.length - 1, 0);
        options.forEach((option, index) => {
          option.classList.toggle("active", index === state.tagActiveIndex);
          option.setAttribute(
            "aria-selected",
            String(index === state.tagActiveIndex),
          );
        });

        els.tagMenu.classList.toggle(
          "open",
          state.tagMenuOpen && els.tagMenu.children.length > 0,
        );
      }

      function getTagOptions() {
        return [...els.tagMenu.querySelectorAll(".tag-option")];
      }

      function moveTagActive(delta) {
        state.tagMenuOpen = true;
        renderTagSelect();
        const options = getTagOptions();
        if (!options.length) return;
        state.tagActiveIndex =
          (state.tagActiveIndex + delta + options.length) % options.length;
        renderTagSelect();
        getTagOptions()[state.tagActiveIndex]?.scrollIntoView({
          block: "nearest",
        });
      }

      function selectActiveTag() {
        const active = getTagOptions()[state.tagActiveIndex];
        if (state.tagMenuOpen && active?.dataset.value) {
          addFormTag(active.dataset.value);
          return true;
        }
        return false;
      }

      function addFormTag(value, shouldFocus = true) {
        const nextTags = normalizeTags(value);
        if (!nextTags.length) return;
        state.formTags = [...new Set([...state.formTags, ...nextTags])];
        els.tagsInput.value = "";
        state.tagMenuOpen = true;
        state.tagActiveIndex = 0;
        renderTagSelect();
        if (shouldFocus) els.tagsInput.focus();
      }

      function removeFormTag(tag) {
        state.formTags = state.formTags.filter((item) => item !== tag);
        renderTagSelect();
        els.tagsInput.focus();
      }

      function renderGroups() {
        const groups = new Set(state.groups);
        state.links.forEach((link) => groups.add(cleanGroup(link.group)));
        state.groups = getUniqueGroups([...groups]);
        renderGroupSelect();
      }

      function renderGroupSelect() {
        const query = state.groupFilter.trim().toLowerCase();
        const candidates = state.groups
          .filter((group) => group !== NO_GROUP)
          .filter((group) => !query || group.toLowerCase().includes(query));
        els.groupMenu.replaceChildren();

        candidates.forEach((group) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "group-option";
          option.textContent = group;
          option.dataset.value = group;
          option.addEventListener("mousedown", (event) =>
            event.preventDefault(),
          );
          option.addEventListener("click", () => selectGroup(group));
          els.groupMenu.append(option);
        });

        const exactMatch = state.groups.some(
          (group) => group.toLowerCase() === query,
        );
        if (query && !exactMatch) {
          const newGroup = state.groupFilter.trim();
          const create = document.createElement("button");
          create.type = "button";
          create.className = "group-option";
          create.textContent = `Create "${newGroup}"`;
          create.dataset.value = newGroup;
          create.addEventListener("mousedown", (event) =>
            event.preventDefault(),
          );
          create.addEventListener("click", () => selectGroup(newGroup));
          els.groupMenu.prepend(create);
        }

        const options = getGroupOptions();
        if (state.groupActiveIndex >= options.length)
          state.groupActiveIndex = Math.max(options.length - 1, 0);
        options.forEach((option, index) => {
          option.classList.toggle("active", index === state.groupActiveIndex);
          option.setAttribute(
            "aria-selected",
            String(index === state.groupActiveIndex),
          );
        });

        els.groupMenu.classList.toggle(
          "open",
          state.groupMenuOpen && els.groupMenu.children.length > 0,
        );
      }

      function getGroupOptions() {
        return [...els.groupMenu.querySelectorAll(".group-option")];
      }

      function moveGroupActive(delta) {
        state.groupMenuOpen = true;
        renderGroupSelect();
        const options = getGroupOptions();
        if (!options.length) return;
        state.groupActiveIndex =
          (state.groupActiveIndex + delta + options.length) % options.length;
        renderGroupSelect();
        getGroupOptions()[state.groupActiveIndex]?.scrollIntoView({
          block: "nearest",
        });
      }

      function selectActiveGroup() {
        const active = getGroupOptions()[state.groupActiveIndex];
        if (state.groupMenuOpen && active?.dataset.value) {
          selectGroup(active.dataset.value);
          return true;
        }
        return false;
      }

      function selectGroup(value, shouldFocus = true) {
        const group = cleanGroup(value);
        els.groupInput.value = group === NO_GROUP ? "" : group;
        state.groupMenuOpen = false;
        state.groupActiveIndex = 0;
        state.groupFilter = "";
        renderGroupSelect();
        if (shouldFocus) els.groupInput.focus();
      }

      function renderGroupList() {
        els.groupList.replaceChildren();
        const usage = new Map();
        state.links.forEach((link) => {
          const group = cleanGroup(link.group);
          usage.set(group, (usage.get(group) || 0) + 1);
        });

        // 未所属は改名も削除もできないため、グループ管理には出さない
        const displayGroups = state.groups.filter(
          (group) => group !== NO_GROUP,
        );

        displayGroups.forEach((group) => {
          const item = document.createElement("div");
          item.className = "group-item";
          const count = usage.get(group) || 0;
          const inUse = count > 0;

          let name;
          if (state.editingGroup === group) {
            name = document.createElement("input");
            name.className = "group-edit-input";
            name.value = group;
            name.addEventListener("keydown", (event) => {
              if (event.key === "Enter") {
                event.preventDefault();
                commitGroupRename(group, name.value);
              }
              if (event.key === "Escape") {
                event.preventDefault();
                cancelGroupRename();
              }
            });
            name.addEventListener("blur", () =>
              commitGroupRename(group, name.value),
            );
            requestAnimationFrame(() => {
              name.focus();
              name.select();
            });
          } else {
            name = document.createElement("button");
            name.type = "button";
            name.className = "group-name";
            name.title = "クリックして名前を編集";
            name.addEventListener("click", () => startGroupRename(group));

            const label = document.createElement("span");
            label.className = "group-name-label";
            label.textContent = group;

            const editIcon = document.createElement("span");
            editIcon.className = "group-edit-icon";
            editIcon.setAttribute("aria-hidden", "true");
            editIcon.innerHTML =
              '<svg viewBox="0 0 16 16" fill="none"><path d="M11.7 2.3 13.7 4.3 5.6 12.4 2.8 13.2 3.6 10.4 11.7 2.3Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.3 3.7 12.3 5.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';

            name.append(label, editIcon);
          }

          const meta = document.createElement("span");
          meta.className = "group-meta";
          meta.textContent = `${count} ${count === 1 ? "link" : "links"}`;

          const actions = document.createElement("div");
          actions.className = "group-actions";

          const remove = smallButton(
            "Delete",
            () => deleteGroup(group),
            "danger",
          );
          remove.title = inUse
            ? `${count} 件のリンクを残してグループを削除`
            : "グループを削除";
          actions.append(remove);

          item.append(name, meta, actions);
          els.groupList.append(item);
        });
      }

      function renderBoard(links) {
        els.boardView.replaceChildren();
        if (!links.length) {
          els.boardView.append(emptyState());
          return;
        }

        const grouped = groupBy(links, (link) => cleanGroup(link.group));
        // グループセクションは実グループのみ。未所属はセクション化しない
        const orderedGroups = [
          ...state.groups,
          ...Object.keys(grouped)
            .filter((group) => !state.groups.includes(group))
            .sort((a, b) => a.localeCompare(b, "ja")),
        ].filter((group) => group !== NO_GROUP);
        const pinnedLinks = links.filter((link) => link.pinned);
        const favorites = renderFavorites(pinnedLinks);
        if (favorites) els.boardView.append(favorites);

        const board = document.createElement("div");
        board.className = "board";

        orderedGroups.forEach((group) => {
          const groupLinks = grouped[group];
          if (!groupLinks || !groupLinks.length) return;
          appendBoardSection(board, group, groupLinks);
        });

        // グループの下に全リンクを表示（所属の有無を問わず全件。グループ所属リンクは両方に出る）
        appendBoardSection(board, ALL_SECTION, links, {
          label: "All",
          showAdd: false,
          variant: "group-section--all",
        });

        els.boardView.append(board);
      }

      function renderFavorites(pinnedLinks) {
        if (!pinnedLinks.length) return null;

        const section = document.createElement("section");
        section.className = "favorites-section";
        section.setAttribute("aria-labelledby", "favoritesTitle");

        const head = document.createElement("div");
        head.className = "favorites-head";

        const titleWrap = document.createElement("div");
        titleWrap.className = "favorites-title-wrap";

        const icon = document.createElement("span");
        icon.className = "favorites-icon";
        icon.innerHTML =
          '<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M9.6 1.8 14.2 6.4 12.7 7.9 11.4 7.4 8.9 9.9 9.1 12.3 8.4 13 5.4 10 2.2 13.2 1.6 12.6 4.8 9.4 1.8 6.4 2.5 5.7 4.9 5.9 7.4 3.4 6.9 2.1 8.4.6 9.6 1.8Z" fill="currentColor"/></svg>';

        const title = document.createElement("h2");
        title.className = "favorites-title";
        title.id = "favoritesTitle";
        title.textContent = "Pinned";

        titleWrap.append(icon, title);

        const count = document.createElement("span");
        count.className = "count";
        count.textContent = String(pinnedLinks.length);

        head.append(titleWrap, count);

        const grid = document.createElement("div");
        grid.className = "link-grid";
        pinnedLinks.forEach((link) => {
          grid.append(createBoardLinkButton(link));
        });

        section.append(head, grid);
        return section;
      }

      function appendBoardSection(board, group, groupLinks, options = {}) {
        if (!groupLinks.length) return;
        const {
          collapseKey = group,
          label = group,
          showAdd = true,
          variant = "",
        } = options;
        const isCollapsed = state.collapsedGroups.includes(collapseKey);
        const section = document.createElement("section");

        const head = document.createElement("div");

        const titleArea = document.createElement("div");

        const titleWrap = document.createElement("button");

        titleWrap.className = "group-title-wrap";

        titleWrap.setAttribute(
          "aria-label",
          `${label} を${isCollapsed ? "展開" : "折りたたみ"}`,
        );
        titleWrap.addEventListener("click", () => toggleGroup(collapseKey));
        const toggle = document.createElement("span");
        toggle.className = "group-toggle";
        toggle.innerHTML =
          '<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4.5 6 8 9.5 11.5 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const title = document.createElement("h2");

        if (showAdd) {

          add.type = "button";
          add.className = "group-add";
          add.textContent = "+";
          add.setAttribute("aria-label", `${label} にリンクを追加`);

          add.addEventListener("click", () => openModal(null, { group }));
          titleArea.append(add);
        }
        const count = document.createElement("span");
        count.className = "count";
        count.textContent = String(groupLinks.length);
        head.append(titleArea, count);

        const grid = document.createElement("div");
        grid.className = "link-grid";
        grid.hidden = isCollapsed;
        groupLinks.forEach((link) => {
          grid.append(createBoardLinkButton(link));
        });

        section.append(head, grid);
        board.append(section);
      }

      function createBoardLinkButton(link) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "link-button";
        button.title = `${link.title}\n${link.url}`;

        const icon = document.createElement("span");
        icon.className = "board-link-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.innerHTML =
          '<svg viewBox="0 0 16 16" fill="none"><path d="M6 4.5h5.5V10M11.2 4.8 4.5 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        const content = document.createElement("span");
        content.className = "board-link-content";

        const title = document.createElement("span");
        title.className = "board-link-title";
        appendHighlighted(title, link.title);
        content.append(title);

        if (link.pinned) {
          const pin = document.createElement("span");
          pin.className = "board-link-pin";
          pin.title = "Pinned";
          pin.setAttribute("aria-label", "Pinned");

            '<svg viewBox="0 0 16 16" fill="none"><path d="M9.6 1.8 14.2 6.4 12.7 7.9 11.4 7.4 8.9 9.9 9.1 12.3 8.4 13 5.4 10 2.2 13.2 1.6 12.6 4.8 9.4 1.8 6.4 2.5 5.7 4.9 5.9 7.4 3.4 6.9 2.1 8.4.6 9.6 1.8Z" fill="currentColor"/></svg>';
          content.append(pin);
        }

        button.append(icon, content);
        button.addEventListener("click", () => openLink(link));
        return button;
      }

      function toggleGroup(group) {
        if (state.collapsedGroups.includes(group)) {
          state.collapsedGroups = state.collapsedGroups.filter(
            (item) => item !== group,
          );
        } else {
          state.collapsedGroups = [...state.collapsedGroups, group];
        }
        persist();
        render();
      }

      function renderList(links) {
        els.listView.replaceChildren();
        if (!links.length) {
          els.listView.append(emptyState());
          return;
        }

        const list = document.createElement("div");
        list.className = "list";
        const head = document.createElement("div");
        head.className = "list-head";
        ["#", "Title", "URL", "Group", "Tags", "Actions"].forEach((label) => {
          const cell = document.createElement("div");
          cell.textContent = label;
          head.append(cell);
        });
        list.append(head);
        links.forEach((link, index) => {
          const row = document.createElement("article");
          row.className = "row";

          const rowIndex = document.createElement("div");
          rowIndex.className = "row-index";
          rowIndex.textContent = String(index + 1).padStart(2, "0");

          const title = document.createElement("div");
          title.className = "row-title";
          const titleText = document.createElement("button");
          titleText.type = "button";
          titleText.className = "row-title-button";
          appendHighlighted(titleText, link.title);
          titleText.title = `${link.title}\nOpen link`;
          titleText.addEventListener("click", () => openLink(link));
          title.append(titleText);

          const url = document.createElement("button");
          url.type = "button";
          url.className = "row-url";
          url.classList.toggle("copied", state.copiedLinkId === link.id);
          url.textContent =
            state.copiedLinkId === link.id ? "Copied" : link.url;
          url.title = `${link.url}\nClick to copy`;
          url.addEventListener("click", () => copyUrl(link.url, link.id));

          const group = document.createElement("div");
          group.className = "row-group";
          const linkGroup = cleanGroup(link.group);
          // 未所属は List の GROUP 列を空欄にする
          group.textContent = linkGroup === NO_GROUP ? "" : linkGroup;

          const tags = document.createElement("div");
          tags.className = "row-tags";
          tags.title = link.tags.length ? link.tags.join(", ") : "no tags";
          if (link.tags.length) {
            link.tags.forEach((tag) => {
              const span = document.createElement("span");
              span.className = "mini-tag";
              span.textContent = tag;
              tags.append(span);
            });
          } else {
            const span = document.createElement("span");
            span.className = "mini-tag";
            span.textContent = "no tags";
            tags.append(span);
          }

          const actions = document.createElement("div");
          actions.className = "row-actions";
          actions.append(
            pinToggleButton(link),
            rowActionButton("Edit", "edit", () => openModal(link)),
            rowActionButton(
              "Delete",
              "delete",
              () => deleteLink(link.id),
              "danger",
            ),

          row.append(rowIndex, title, url, group, tags, actions);
