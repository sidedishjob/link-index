        els.listView.append(list);
      }

      function pinToggleButton(link) {
        const button = rowActionButton(
          link.pinned ? "Pinned" : "Pin",
          "pin",
          () => togglePin(link.id),
          link.pinned ? "active" : "",
        );
        button.title = link.pinned ? "Pinnedから外す" : "Pinnedに追加";
        button.setAttribute("aria-pressed", String(link.pinned));
        return button;
      }

      function rowActionButton(label, iconName, action, variant = "") {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `row-action ${variant}`.trim();
        const icon = document.createElement("span");
        icon.className = "row-action-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.innerHTML = rowActionIcon(iconName);
        const text = document.createElement("span");
        text.textContent = label;
        button.append(icon, text);
        button.addEventListener("click", action);
        return button;
      }

      function rowActionIcon(name) {
        if (name === "edit") {
          return '<svg viewBox="0 0 16 16" fill="none"><path d="M3.2 11.9 3 14l2.1-.2 7-7-1.9-1.9-7 7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="m9.5 3.6.8-.8a1.3 1.3 0 0 1 1.9 0l1 1a1.3 1.3 0 0 1 0 1.9l-.8.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
        }
        if (name === "delete") {
          return '<svg viewBox="0 0 16 16" fill="none"><path d="M3 4.2h10M6.2 4.2V3a1 1 0 0 1 1-1h1.6a1 1 0 0 1 1 1v1.2M5 6v6.2A1.8 1.8 0 0 0 6.8 14h2.4a1.8 1.8 0 0 0 1.8-1.8V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
        }
        return '<svg viewBox="0 0 16 16" fill="none"><path d="M9.6 1.8 14.2 6.4 12.7 7.9 11.4 7.4 8.9 9.9 9.1 12.3 8.4 13 5.4 10 2.2 13.2 1.6 12.6 4.8 9.4 1.8 6.4 2.5 5.7 4.9 5.9 7.4 3.4 6.9 2.1 8.4.6 9.6 1.8Z" fill="currentColor"/></svg>';
      }

      function smallButton(label, action, variant = "") {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `button ${variant}`.trim();
        button.textContent = label;
        button.addEventListener("click", action);
        return button;
      }

      function emptyState() {
        const empty = document.createElement("div");
        empty.className = "empty";
        const title = document.createElement("div");
        title.className = "empty-title";
        title.textContent = "該当するリンクがありません。";
        empty.append(title);

        const conditions = [];
        if (state.query.trim()) conditions.push(`検索: ${state.query.trim()}`);
        if (state.tag !== "all") conditions.push(`タグ: ${state.tag}`);
        if (conditions.length) {
          const detail = document.createElement("div");
          detail.className = "empty-detail";
          detail.textContent = conditions.join(" / ");
          empty.append(detail);
        }
        return empty;
      }

      function groupBy(items, getter) {
        return items.reduce((result, item) => {
          const key = getter(item);
          result[key] ||= [];
          result[key].push(item);
          return result;
        }, {});
      }

      function updateView() {
        const isBoard = state.view === "board";
        els.boardTab.setAttribute("aria-pressed", String(isBoard));
        els.listTab.setAttribute("aria-pressed", String(!isBoard));
        els.boardView.classList.toggle("active", isBoard);
        els.listView.classList.toggle("active", !isBoard);
      }

      function togglePin(id) {
        state.links = state.links.map((link) =>
          link.id === id
            ? { ...link, pinned: !link.pinned, updatedAt: Date.now() }
            : link,
        );
        persist();
        render();
      }

      function openLink(linkOrUrl) {
        const url = typeof linkOrUrl === "string" ? linkOrUrl : linkOrUrl.url;
        window.open(normalizeUrl(url), "_blank", "noopener");
        if (typeof linkOrUrl !== "string") {
          state.links = state.links.map((link) =>
            link.id === linkOrUrl.id
              ? { ...link, lastOpenedAt: Date.now() }
              : link,
          );
          // lastOpenedAt は画面に出さない（Recent 非実装）。記録だけ残し、再描画はしない。
          persist();
        }
      }

      let copyFeedbackTimer;

      async function copyUrl(url, linkId = null) {
        const normalizedUrl = normalizeUrl(url);
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(normalizedUrl);
          } else {
            copyTextFallback(normalizedUrl);
          }
          showCopyFeedback(linkId);
          showToast("URLをコピーしました");
        } catch {
          copyTextFallback(normalizedUrl);
          showCopyFeedback(linkId);
          showToast("URLをコピーしました");
        }
      }

      function showCopyFeedback(linkId) {
        if (!linkId) return;
        state.copiedLinkId = linkId;
        clearTimeout(copyFeedbackTimer);
        render();
        copyFeedbackTimer = setTimeout(() => {
          if (state.copiedLinkId !== linkId) return;
          state.copiedLinkId = null;
          render();
        }, 1200);
      }

      function copyTextFallback(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        document.body.append(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      const appEl = document.querySelector(".app");
      let lastFocusedBeforeModal = null;

      function isAnyModalOpen() {
        return document.querySelector(".modal.open") !== null;
      }

      function getFocusable(container) {
        const selector =
          'a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])';
        return [...container.querySelectorAll(selector)].filter(
          (el) => el.offsetParent !== null || el === document.activeElement,
        );
      }

      function trapFocus(event, modal) {
        if (event.key !== "Tab" || event.defaultPrevented) return;
        const focusables = getFocusable(modal);
        if (!focusables.length) return;
        const first = focusables[0];
        const last = focusables[focusables.length - 1];
        if (event.shiftKey && document.activeElement === first) {
          event.preventDefault();
          last.focus();
        } else if (!event.shiftKey && document.activeElement === last) {
          event.preventDefault();
          first.focus();
        }
      }

      function onModalOpen() {
        if (!isAnyModalOpen()) lastFocusedBeforeModal = document.activeElement;
        appEl.inert = true;
        appEl.setAttribute("aria-hidden", "true");
      }

      function onModalClose() {
        if (isAnyModalOpen()) return;
        appEl.inert = false;
        appEl.removeAttribute("aria-hidden");
        if (
          lastFocusedBeforeModal &&
          document.contains(lastFocusedBeforeModal)
        ) {
          lastFocusedBeforeModal.focus();
        }
        lastFocusedBeforeModal = null;
      }

      function resetLinkForm() {
        els.linkForm.reset();
        state.editingId = null;
        state.autoTitleValue = "";
        state.formTags = [];
        state.formLoadedFor = null;
        els.tagsInput.value = "";
      }

      function openModal(link = null, defaults = {}) {
        onModalOpen();
        // 下書きの保持はヘッダーの「+ New」だけ（link なし・グループ指定なし）。
        // Board のグループ「+」と Edit は常に対象内容で読み込み直す。
        const draftKey = !link && defaults.group == null ? "__new__" : null;
        const keepDraft = draftKey !== null && state.formLoadedFor === draftKey;

        els.modalTitle.textContent = link ? "Edit link" : "New link";

        if (!keepDraft) {
          state.editingId = link?.id || null;
          state.autoTitleValue = "";
          els.urlInput.value = link?.url || "";
          els.titleInput.value = link?.title || "";
          const sourceGroup =
            link || defaults.group
              ? cleanGroup(link?.group || defaults.group)
              : "";
          els.groupInput.value = sourceGroup === NO_GROUP ? "" : sourceGroup;
          state.formTags = [...(link?.tags || [])];
          els.noteInput.value = link?.note || "";
          state.formLoadedFor = draftKey;
        }

        renderGroups();
        state.groupMenuOpen = false;
        state.groupActiveIndex = 0;
        state.groupFilter = "";
        renderGroupSelect();
        els.tagsInput.value = "";
        state.tagMenuOpen = false;
        state.tagActiveIndex = 0;
        renderTagSelect();
        els.modal.classList.add("open");
        setTimeout(() => (link ? els.titleInput : els.urlInput).focus(), 0);
      }

      // 閉じても入力値は保持する（破棄は Save 成功時のみ）。ここでは表示を隠して
      // ドロップダウンの一時状態だけ畳む。
      function closeModal() {
        els.modal.classList.remove("open");
        state.groupMenuOpen = false;
        state.groupActiveIndex = 0;
        state.groupFilter = "";
        state.tagMenuOpen = false;
        state.tagActiveIndex = 0;
        renderGroupSelect();
        renderTagSelect();
        onModalClose();
      }

      function openGroupsModal() {
        onModalOpen();
        renderGroupList();
        els.groupsModal.classList.add("open");
        setTimeout(() => els.newGroupInput.focus(), 0);
      }

      function closeGroupsModal() {
        els.groupsModal.classList.remove("open");
        els.groupForm.reset();
        onModalClose();
      }

      function saveForm(event) {
        event.preventDefault();
        addFormTag(els.tagsInput.value, false);
        selectGroup(els.groupInput.value, false);
        const now = Date.now();
        const data = {
          title: els.titleInput.value.trim(),
          url: normalizeUrl(els.urlInput.value),
          group: cleanGroup(els.groupInput.value),
          tags: state.formTags,
          note: els.noteInput.value.trim(),
        };

        if (!data.title || !data.url) {
          showToast("Title と URL は必須です");
          return;
        }

        const duplicate = state.links.find(
          (link) => link.url === data.url && link.id !== state.editingId,
        );
        if (
          duplicate &&
          !confirm(
            `同じURLのリンク「${duplicate.title}」が既にあります。保存しますか？`,
          )
        ) {
          return;
        }

        if (state.editingId) {
          state.links = state.links.map((link) =>
            link.id === state.editingId
              ? { ...link, ...data, updatedAt: now }
              : link,
          );
          showToast("リンクを更新しました");
        } else {
          state.links = [
            { id: uid(), ...data, createdAt: now },
            ...state.links,
          ];
          showToast("リンクを追加しました");
        }

        state.groups = getUniqueGroups([...state.groups, data.group]);
        persist();
        closeModal();
        resetLinkForm();
        render();
      }

      function saveGroup(event) {
        event.preventDefault();
        const group = cleanGroup(els.newGroupInput.value);
        if (!group) return;
        if (state.groups.includes(group)) {
          showToast("同じグループが既にあります");
          return;
        }
        state.groups = getUniqueGroups([...state.groups, group]);
        els.groupForm.reset();
        persist();
        closeGroupsModal();
        render();
        showToast("グループを追加しました");
        openModal(null, { group });
      }

      function startGroupRename(group) {
        if (group === NO_GROUP) {
          showToast("未所属は改名できません");
          return;
        }
        state.editingGroup = group;
        renderGroupList();
      }

      function cancelGroupRename() {
        state.editingGroup = null;
        renderGroupList();
      }

      function commitGroupRename(group, value) {
        if (state.editingGroup !== group) return;

        const next = cleanGroup(value);
        if (!next || next === group) {
          cancelGroupRename();
          return;
        }

        if (state.groups.includes(next)) {
          showToast("同じグループが既にあります");
          cancelGroupRename();
          return;
        }

        state.groups = getUniqueGroups(
          state.groups.map((item) => (item === group ? next : item)),
        );
        state.links = state.links.map((link) =>
          cleanGroup(link.group) === group
            ? { ...link, group: next, updatedAt: Date.now() }
            : link,
        );
        state.collapsedGroups = state.collapsedGroups.map((item) =>
          item === group ? next : item,
        );
        state.editingGroup = null;
        persist();
        render();
        showToast("グループ名を変更しました");
      }

      function deleteGroup(group) {
        if (group === NO_GROUP) {
          showToast("未所属は削除できません");
          return;
        }
        // 使用中でも削除可。所属リンクは消さず「未分類」へ逃がす（非破壊）。
        const linkedCount = state.links.filter(
          (link) => cleanGroup(link.group) === group,
        ).length;
        if (linkedCount) {
          const ok = confirm(
            `「${group}」を削除しますか？\n` +
              `このグループの ${linkedCount} 件のリンクは残ります。`,
          );
          if (!ok) return;
          const now = Date.now();
          state.links = state.links.map((link) =>
            cleanGroup(link.group) === group
              ? { ...link, group: NO_GROUP, updatedAt: now }
              : link,
          );
        }
        state.groups = state.groups.filter((item) => item !== group);
        state.collapsedGroups = state.collapsedGroups.filter(
          (item) => item !== group,
        );
        persist();
        render();
        showToast(
          linkedCount
            ? `${linkedCount} 件のリンクを残してグループを削除しました`
            : "グループを削除しました",
        );
      }

      function deleteLink(id) {
        const link = state.links.find((item) => item.id === id);
        if (!link) return;
        if (!confirm(`「${link.title}」を削除しますか？`)) return;
        state.links = state.links.filter((item) => item.id !== id);
        persist();
        render();
        showToast("リンクを削除しました");
      }

      function exportData() {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          groups: state.groups,
          links: state.links,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `link-index-${new Date().toISOString().slice(0, 10)}.json`;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function importData(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const rawLinks = Array.isArray(parsed)
              ? parsed
              : Array.isArray(parsed?.links)
                ? parsed.links
                : Array.isArray(parsed?.data?.links)
                  ? parsed.data.links
                  : [];
            const rawGroups = Array.isArray(parsed?.groups)
              ? parsed.groups
              : Array.isArray(parsed?.data?.groups)
                ? parsed.data.groups
                : [];
            const imported = rawLinks
              .map(normalizeLink)
              .filter((link) => link.title && link.url);
            if (!imported.length) {
              showToast("読み込めるリンクがありません");
              return;
            }
            const existingUrls = new Set(state.links.map((link) => link.url));
            const duplicateCount = imported.filter((link) =>
              existingUrls.has(link.url),
            ).length;
            state.pendingImport = { groups: rawGroups, links: imported };
            els.importSummary.innerHTML = `
            <div><strong>${imported.length}</strong> links found.</div>
            <div><strong>${duplicateCount}</strong> duplicate URLs will be skipped on merge.</div>
            <div>Merge keeps current data. Replace clears current links first.</div>
          `;
            onModalOpen();
            els.importModal.classList.add("open");
          } catch {
            showToast("JSONの読み込みに失敗しました");
          }
        });
        reader.readAsText(file);
      }

      function applyImport(mode) {
        if (!state.pendingImport) return;
        const imported = state.pendingImport.links;
        const importedGroups = state.pendingImport.groups;
        if (mode === "replace") {
          state.links = imported;
          state.groups = getUniqueGroups([
            ...DEFAULT_GROUPS,
            ...importedGroups,
            ...imported.map((link) => link.group),
          ]);
        } else {
          const existingUrls = new Set(state.links.map((link) => link.url));
          state.links = [
            ...state.links,
            ...imported.filter((link) => !existingUrls.has(link.url)),
          ];
          state.groups = getUniqueGroups([
            ...state.groups,
            ...importedGroups,
            ...imported.map((link) => link.group),
          ]);
        }
        state.pendingImport = null;
        els.importModal.classList.remove("open");
        onModalClose();
        persist();
        render();
        showToast(
          mode === "replace"
            ? "データを置換しました"
            : "データをマージしました",
        );
      }

      function closeImportModal() {
        state.pendingImport = null;
        els.importModal.classList.remove("open");
        onModalClose();
      }

      function openDataModal() {
        onModalOpen();
        renderStorageUsage();
        els.dataModal.classList.add("open");
      }

      function closeDataModal() {
        els.dataModal.classList.remove("open");
        onModalClose();
      }

      function toggleSettingsMenu() {
        state.settingsOpen = !state.settingsOpen;
        renderSettingsMenu();
      }

      function closeSettingsMenu() {
        if (!state.settingsOpen) return;
        state.settingsOpen = false;
        renderSettingsMenu();
      }

      function renderSettingsMenu() {
        els.settingsMenu.classList.toggle("open", state.settingsOpen);
        els.settingsButton.setAttribute(
          "aria-expanded",
          String(state.settingsOpen),
        );
      }

      function renderStorageUsage() {
        const value = localStorage.getItem(STORAGE_KEY) || "";
        const bytes = new Blob([value]).size;
        els.storageUsage.textContent = `Storage: ${formatBytes(bytes)} / localStorage`;
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        const kb = bytes / 1024;
        if (kb < 1024) return `${kb.toFixed(kb < 10 ? 1 : 0)} KB`;
        const mb = kb / 1024;
        return `${mb.toFixed(mb < 10 ? 1 : 0)} MB`;
      }

      function clearData() {
        if (!confirm("すべてのリンクを削除しますか？")) return;
        state.links = [];
        state.groups = [...DEFAULT_GROUPS];
        state.collapsedGroups = [];
        persist();
        closeDataModal();
        render();
        showToast("データを削除しました");
      }

      function restoreSamples() {
        if (
          !confirm("サンプルデータに戻しますか？現在のリンクは置き換わります。")
        )
          return;
        state.links = sampleLinks.map(normalizeLink);
        state.groups = getUniqueGroups([
          ...DEFAULT_GROUPS,
          ...state.links.map((link) => link.group),
        ]);
        state.collapsedGroups = [];
        persist();
        closeDataModal();
        render();
        showToast("サンプルを復元しました");
      }

      function handleUrlInput() {
        if (!els.urlInput.value.trim()) {
          clearAutoTitle();
          return;
        }
        if (
          els.titleInput.value.trim() &&
          els.titleInput.value.trim() !== state.autoTitleValue
        )
          return;
        const title = inferTitleFromUrl(els.urlInput.value);
        if (title) setAutoTitle(title);
      }

      function handleUrlPaste(event) {
        if (
          els.titleInput.value.trim() &&
          els.titleInput.value.trim() !== state.autoTitleValue
        )
          return;
        const clipboard = event.clipboardData;
        const html = clipboard?.getData("text/html") || "";
        const text = clipboard?.getData("text/plain") || "";
        const parsed = parseHtmlLink(html);
        if (parsed?.url) {
          event.preventDefault();
          els.urlInput.value = parsed.url;
          setAutoTitle(parsed.title || inferTitleFromUrl(parsed.url));
          return;
        }
        const title = inferTitleFromUrl(text);
        if (title) {
          setTimeout(() => {
            if (
              !els.titleInput.value.trim() ||
              els.titleInput.value.trim() === state.autoTitleValue
            )
              setAutoTitle(title);
          }, 0);
        }
      }

      function setAutoTitle(title) {
        const normalizedTitle = String(title || "").trim();
        if (!normalizedTitle) return;
        els.titleInput.value = normalizedTitle;
        state.autoTitleValue = normalizedTitle;
      }

      function clearAutoTitle() {
        if (els.titleInput.value.trim() === state.autoTitleValue) {
          els.titleInput.value = "";
        }
        state.autoTitleValue = "";
      }

      function parseHtmlLink(html) {
        if (!html.trim()) return null;
        const template = document.createElement("template");
        template.innerHTML = html;
        const anchor = template.content.querySelector("a[href]");
        if (!anchor) return null;
        return {
          url: anchor.href,
          title: anchor.textContent.trim(),
        };
      }

      // SharePoint の定型ページ名など、title として無意味なパスセグメント。
      const TITLE_NOISE_SEGMENTS = new Set([
        "forms",
        "allitems.aspx",
        "doc.aspx",
        "wopiframe.aspx",
        "default.aspx",
        "home.aspx",
        "start.aspx",
        "_layouts",
        "15",
      ]);

      // ファイル名末尾から落とす拡張子（Office / PDF / SharePoint ページ等）。
      const TITLE_EXTENSION_RE =
        /\.(docx?|docm|xlsx?|xlsm|pptx?|pptm|pdf|one|vsdx?|csv|txt|rtf|msg|aspx|html?|od[tsp])$/i;

      function inferTitleFromUrl(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";

        let url;
        try {
          url = new URL(normalizeUrl(raw));
        } catch {
          return "";
        }

        const params = url.searchParams;
        const candidates = [
          params.get("file"),
          params.get("id"),
          params.get("RootFolder"),
          params.get("sourcedoc"),
          url.pathname,
        ].filter(Boolean);

        for (const candidate of candidates) {
          const slug = lastMeaningfulSegment(candidate);
          if (isMeaninglessSlug(slug)) continue;
          return prettifyTitle(slug);
        }

        return prettifyTitle(url.hostname.replace(/^www\./, ""));
      }

      // パス/クエリ値から、表示に使える最後のセグメント(ファイル名・フォルダ名)を取り出す。
      // SharePoint の Forms/AllItems.aspx のような定型セグメントは飛ばし、拡張子は落とす。
      function lastMeaningfulSegment(value) {
        const path = String(value || "")
          .split("?")[0]
          .split("#")[0];
        const segments = path
          .split("/")
          .map(safeDecode)
          .map((segment) => segment.trim())
          .filter(Boolean)
          .filter(
            (segment) => !TITLE_NOISE_SEGMENTS.has(segment.toLowerCase()),
          );
        const last = segments.pop() || "";
        return last.replace(TITLE_EXTENSION_RE, "");
      }

      function safeDecode(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }

      // 画面に出して意味をなさないスラッグ(GUID / ハッシュ / Drive・共有リンクの不透明 ID)を弾く。
      // 区切り正規化の前に生スラッグで判定するため、GUID の "-" がそのまま残っている。
      function isMeaninglessSlug(slug) {
        const value = String(slug || "").trim();
        if (!value) return true;
        if (
          /^\{?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\}?$/i.test(
            value,
          )
        )
          return true;
        if (/^[0-9a-f]{24,}$/i.test(value)) return true;
        if (looksLikeOpaqueId(value)) return true;
        return false;
      }

      // drive.google.com のフォルダ ID や SharePoint 共有リンクのトークンのような、
      // 区切りのない長い英数字ランダム列を「不透明 ID」とみなす。
      // 実ファイル名の誤検出を避けるため、長さ・数字・大小混在・母音比で厳しめに判定する。
      function looksLikeOpaqueId(value) {
        const text = String(value || "");
        if (text.length < 24) return false;
        if (/[\s　]/.test(text)) return false;
        if (!/^[A-Za-z0-9_-]+$/.test(text)) return false;
        if (!/[0-9]/.test(text)) return false;
        if (!(/[a-z]/.test(text) && /[A-Z]/.test(text))) return false;
        const letters = text.replace(/[^A-Za-z]/g, "");
        const vowels = (text.match(/[aeiou]/gi) || []).length;
        return letters.length > 0 && vowels / letters.length < 0.3;
      }

      // スラッグを表示用に整形する(ハイフンは空白へ、アンダースコアは保持、連続空白を畳む)。
      function prettifyTitle(slug) {
        return String(slug || "")
          .replace(/-+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(
          () => els.toast.classList.remove("show"),
          2200,
        );
      }

      els.boardTab.addEventListener("click", () => {
        state.view = "board";
        render();
      });

      els.listTab.addEventListener("click", () => {
        state.view = "list";
        render();
      });

      let searchDebounceTimer;
      els.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(render, 110);
      });

      els.tagToggleButton.addEventListener("click", () => {
        state.tagbarOpen = !state.tagbarOpen;
        renderTags();
      });

      els.newButton.addEventListener("click", () => openModal());
      els.groupsButton.addEventListener("click", openGroupsModal);
      els.settingsButton.addEventListener("click", toggleSettingsMenu);
      els.dataButton.addEventListener("click", () => {
        closeSettingsMenu();
        openDataModal();
      });
      els.closeModalButton.addEventListener("click", closeModal);
      els.closeGroupsButton.addEventListener("click", closeGroupsModal);
      els.closeImportButton.addEventListener("click", closeImportModal);
      els.cancelImportButton.addEventListener("click", closeImportModal);
      els.mergeImportButton.addEventListener("click", () =>
        applyImport("merge"),
      );
      els.replaceImportButton.addEventListener("click", () =>
        applyImport("replace"),
      );
      els.closeDataButton.addEventListener("click", closeDataModal);
      els.clearDataButton.addEventListener("click", clearData);
      els.restoreSamplesButton.addEventListener("click", restoreSamples);
      els.cancelButton.addEventListener("click", closeModal);
      els.linkForm.addEventListener("submit", saveForm);
      els.groupForm.addEventListener("submit", saveGroup);
      els.urlInput.addEventListener("input", handleUrlInput);
      els.urlInput.addEventListener("paste", handleUrlPaste);
      els.groupInput.addEventListener("focus", () => {
        state.tagMenuOpen = false;
        renderTagSelect();
        state.groupMenuOpen = true;
        state.groupActiveIndex = 0;
        state.groupFilter = "";
        renderGroupSelect();
      });
      els.groupSelect.addEventListener("click", () => {
        state.groupMenuOpen = true;
        state.groupActiveIndex = 0;
        state.groupFilter = "";
        renderGroupSelect();
        els.groupInput.focus();
      });
      els.groupInput.addEventListener("input", () => {
        state.groupMenuOpen = true;
        state.groupActiveIndex = 0;
        state.groupFilter = els.groupInput.value;
        renderGroupSelect();
      });
      els.groupInput.addEventListener("keydown", (event) => {
        if (event.key === "Tab") {
          event.preventDefault();
          selectGroup(els.groupInput.value, false);
          state.groupMenuOpen = false;
          renderGroupSelect();
          if (event.shiftKey) {
            els.titleInput.focus();
          } else {
            els.tagsInput.focus();
          }
          return;
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          moveGroupActive(1);
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          moveGroupActive(-1);
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          if (!selectActiveGroup()) selectGroup(els.groupInput.value);
          return;
        }

        if (event.key === "Escape") {
          event.stopPropagation();
          state.groupMenuOpen = false;
          renderGroupSelect();
        }
      });
      els.groupInput.addEventListener("blur", () => {
        setTimeout(() => {
          selectGroup(els.groupInput.value, false);
          state.groupMenuOpen = false;
          renderGroupSelect();
        }, 120);
      });
      els.tagsInput.addEventListener("focus", () => {
        state.groupMenuOpen = false;
        renderGroupSelect();
        state.tagMenuOpen = true;
        state.tagActiveIndex = 0;
        renderTagSelect();
      });
      document.querySelector("#tagSelect").addEventListener("click", () => {
        state.groupMenuOpen = false;
        renderGroupSelect();
        state.tagMenuOpen = true;
        state.tagActiveIndex = 0;
        renderTagSelect();
        els.tagsInput.focus();
      });
      els.tagsInput.addEventListener("input", () => {
        state.tagMenuOpen = true;
        state.tagActiveIndex = 0;
        renderTagSelect();
      });
      els.tagsInput.addEventListener("keydown", (event) => {
        if (event.key === "Tab") {
          event.preventDefault();
          addFormTag(els.tagsInput.value, false);
          state.tagMenuOpen = false;
          renderTagSelect();
          if (event.shiftKey) {
            els.groupInput.focus();
          } else {
            els.noteInput.focus();
          }
          return;
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          moveTagActive(1);
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          moveTagActive(-1);
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          if (!selectActiveTag()) addFormTag(els.tagsInput.value);
          return;
        }

        if (event.key === ",") {
          event.preventDefault();
          addFormTag(els.tagsInput.value, false);
          return;
        }

        if (
          event.key === "Backspace" &&
          !els.tagsInput.value &&
          state.formTags.length
        ) {
          removeFormTag(state.formTags[state.formTags.length - 1]);
        }

        if (event.key === "Escape") {
          event.stopPropagation();
          state.tagMenuOpen = false;
          renderTagSelect();
        }
      });
      els.tagsInput.addEventListener("blur", () => {
        setTimeout(() => {
          addFormTag(els.tagsInput.value);
          state.tagMenuOpen = false;
          renderTagSelect();
        }, 120);
      });
      els.exportButton.addEventListener("click", () => {
        closeSettingsMenu();
        exportData();
      });
      els.importButton.addEventListener("click", () => {
        closeSettingsMenu();
        els.importFile.click();
      });
      els.importFile.addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) importData(file);
        event.target.value = "";
      });

      els.modal.addEventListener("click", (event) => {
        if (event.target === els.modal) closeModal();
      });

      document.addEventListener("click", (event) => {
        if (!state.settingsOpen) return;
        if (
          els.settingsButton.contains(event.target) ||
          els.settingsMenu.contains(event.target)
        )
          return;
        closeSettingsMenu();
      });

      els.groupsModal.addEventListener("click", (event) => {
        if (event.target === els.groupsModal) closeGroupsModal();
      });

      els.importModal.addEventListener("click", (event) => {
        if (event.target === els.importModal) closeImportModal();
      });

      els.dataModal.addEventListener("click", (event) => {
        if (event.target === els.dataModal) closeDataModal();
      });

      [els.modal, els.groupsModal, els.importModal, els.dataModal].forEach(
        (modal) => {
          modal.addEventListener("keydown", (event) => trapFocus(event, modal));
        },
      );

      document.addEventListener("keydown", (event) => {
        const activeTag = document.activeElement?.tagName;
        const isTyping = ["INPUT", "TEXTAREA", "SELECT"].includes(activeTag);

        if (event.key === "Escape" && els.modal.classList.contains("open")) {
          closeModal();
          return;
        }

        if (
          event.key === "Escape" &&
          els.groupsModal.classList.contains("open")
        ) {
          closeGroupsModal();
          return;
        }

        if (
          event.key === "Escape" &&
          els.importModal.classList.contains("open")
        ) {
          closeImportModal();
          return;
        }

        if (
          event.key === "Escape" &&
          els.dataModal.classList.contains("open")
        ) {
          closeDataModal();
          return;
        }

        if (event.key === "Escape" && state.settingsOpen) {
          closeSettingsMenu();
          els.settingsButton.focus();
          return;
        }

        if (isTyping) return;
        if (isAnyModalOpen()) return;

        if (event.key === "/") {
          event.preventDefault();
          els.searchInput.focus();
        }

        if (event.key.toLowerCase() === "n") {
          event.preventDefault();
          openModal();
        }
      });

      load();
      render();
    </script>
  </body>
</html>
